  <main class="main-content" id="main-content">
    <div class="contact-wrap">
      <h1 class="contact-title">let's get in touch.</h1>

      <form class="contact-form" name="myForm" action="https://formspree.io/f/moqpzlzj" method="POST">
        <label for="name">Name</label>
        <input type="text" name="name" id="name" autocomplete="name">

        <label for="email">Email</label>
        <input type="email" name="mail" id="email" autocomplete="email">

        <label for="message">Message</label>
        <textarea name="message" id="message"></textarea>

        <button class="btn-send" type="submit">Send</button>
      </form>

      <div class="contact-footer">
        <a class="email" href="mailto:dam.grela@gmail.com">dam.grela@gmail.com</a>
