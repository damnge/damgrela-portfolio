  <link rel="icon" type="image/png" sizes="32x32" href="public/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="public/favicon-16x16.png">

  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <script src="js/nav.js"></script>

  <main class="main-content" id="main-content">
    <div class="contact-wrap">
      <h1 class="contact-title">let's get in touch.</h1>

      <form class="contact-form" id="contact-form">
        <label for="name">Name</label>
        <input type="text" name="name" id="name" autocomplete="name" required>

        <label for="email">Email</label>
        <input type="email" name="mail" id="email" autocomplete="email" required>

        <label for="message">Message</label>
        <textarea name="message" id="message" required></textarea>

        <button class="btn-send" type="submit">Send</button>
      </form>

      <p class="form-success" id="form-success">Message sent — I'll be in touch.</p>

      <script>
      document.getElementById('contact-form').addEventListener('submit', function (e) {
        e.preventDefault();
        var form = this;
        var btn  = form.querySelector('.btn-send');
        btn.textContent = 'Sending…';
        btn.disabled = true;

        fetch('https://formspree.io/f/moqpzlzj', {
          method: 'POST',
          headers: { 'Accept': 'application/json' },
          body: new FormData(form)
        })
        .then(function (r) {
          if (r.ok) {
            form.style.display = 'none';
            document.getElementById('form-success').style.display = 'block';
          } else {
            btn.textContent = 'Send';
            btn.disabled = false;
            alert('Something went wrong — please try again.');
          }
        })
        .catch(function () {
          btn.textContent = 'Send';
          btn.disabled = false;
          alert('Something went wrong — please try again.');
        });
      });
      </script>

      <div class="contact-footer">
        <a class="email" href="mailto:dam.grela@gmail.com">dam.grela@gmail.com</a>
      </div>
    </div>
  </main>

  <div class="loader" id="loader"><div class="loader-dot"></div></div>
  <p class="site-copy">©Damian Grela 2026</p>

  <script src="js/app.js"></script>
</body>
</html>
